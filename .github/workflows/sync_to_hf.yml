name: Deploy SentinelAI to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to trigger the deployment manually from the Actions tab if needed
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://SujalDixit1927:$HF_TOKEN@huggingface.co/spaces/SujalDixit1927/Sentinel-AI main
